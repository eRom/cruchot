appId: com.cruchot.app
productName: Cruchot
copyright: Copyright (c) 2026 Romain
forceCodeSigning: false

directories:
  buildResources: resources
  output: dist

files:
  - "out/**/*"
  - "package.json"
  - "!node_modules"
  # Modules natifs + ESM dynamic imports (externalized, not bundled)
  - "node_modules/better-sqlite3/**/*"
  - "node_modules/bindings/**/*"
  - "node_modules/prebuild-install/**/*"
  - "node_modules/node-abi/**/*"
  - "node_modules/file-uri-to-path/**/*"
  - "node_modules/chokidar/**/*"
  - "node_modules/@ai-sdk/mcp/**/*"
  - "node_modules/trash/**/*"
  - "node_modules/@perplexity-ai/**/*"
  - "node_modules/@huggingface/**/*"
  - "node_modules/@qdrant/**/*"
  - "node_modules/onnxruntime-node/**/*"
  - "node_modules/onnxruntime-web/**/*"
  - "node_modules/onnxruntime-common/**/*"

# --- macOS ---
mac:
  category: public.app-category.developer-tools
  icon: resources/icon.icns
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  hardenedRuntime: false
  gatekeeperAssess: false
  notarize: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.plist

# --- Windows ---
win:
  target:
    - nsis
  icon: resources/icon.ico

# --- Linux ---
linux:
  target:
    - AppImage
    - deb
  category: Development
  icon: resources

# --- Installeur Windows ---
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false

# --- DMG macOS ---
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# --- Auto-update via GitHub Releases ---
publish:
  provider: github
  owner: eRom
  repo: cruchot

# --- Fichiers supplementaires ---
extraResources:
  - from: "drizzle"
    to: "drizzle"
  - from: "vendor/qdrant/${os}-${arch}/"
    to: "qdrant/"
    filter:
      - "qdrant*"
  - from: "vendor/models/"
    to: "models/"
