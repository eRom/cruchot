name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimal token permissions — CI only needs to read repo contents.
# CodeQL flagged the absence of an explicit `permissions:` block (alert #1).
permissions:
  contents: read

jobs:
  ci:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (block on high+)
        run: npm audit --audit-level=high --omit=dev

      - name: Lockfile lint (registry + integrity + HTTPS)
        run: npm run lint:lockfile

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Typecheck (renderer)
        run: npx tsc --noEmit -p tsconfig.json

      - name: Typecheck (main process)
        run: npx tsc --noEmit -p tsconfig.node.json
        continue-on-error: true

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E Security tests
        run: npm run test:e2e:security
        env:
          NODE_ENV: production

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-security-report
          path: playwright-report/
          retention-days: 7
