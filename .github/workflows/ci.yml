name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (block on high+)
        run: npm audit --audit-level=high --omit=dev

      - name: Lockfile lint (registry + integrity + HTTPS)
        run: npm run lint:lockfile

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Typecheck (renderer)
        run: npx tsc --noEmit -p tsconfig.json

      - name: Typecheck (main process)
        run: npx tsc --noEmit -p tsconfig.node.json
        continue-on-error: true

      - name: Build
        run: npm run build
