name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pull-requests: read

jobs:
  # ── Security gate ──────────────────────────────────────────
  # Block the release if any open Dependabot security PR exists, OR if
  # npm audit signals high+ in production deps, OR if lockfile-lint detects
  # untrusted dep sources.
  # See audit/security/POLICY.md for the SLA backing this gate.
  security-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (block on high+)
        run: npm audit --audit-level=high --omit=dev

      - name: Lockfile lint (registry + integrity + HTTPS)
        run: npm run lint:lockfile

      - name: Block on open Dependabot security PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Dependabot security update PRs are titled with the "[Security]"
          # prefix (per GitHub's documented format). Counting these via
          # `gh pr list` works with the default GITHUB_TOKEN (no PAT needed),
          # unlike the /dependabot/alerts API which requires the
          # `security_events` scope and returns 403 from a workflow token.
          # Bonus: this checks for actionable fixes (PRs ready to merge),
          # not just theoretical alerts without an available patch.
          OPEN_SECURITY=$(gh pr list \
            --state open \
            --author "app/dependabot" \
            --json title \
            --jq '[.[] | select(.title | test("^\\[Security\\]"))] | length')
          echo "Open Dependabot security PRs: $OPEN_SECURITY"
          if [ "$OPEN_SECURITY" -gt 0 ]; then
            echo "::error::Release blocked — $OPEN_SECURITY open Dependabot security PR(s)"
            echo "::error::Merge them first (they contain the CVE fixes), or close them with an exception documented in audit/security/POLICY.md"
            gh pr list \
              --state open \
              --author "app/dependabot" \
              --json number,title \
              --jq '.[] | select(.title | test("^\\[Security\\]")) | "  - PR #" + (.number|tostring) + ": " + .title'
            exit 1
          fi

  # ── Build & publish (per OS) ───────────────────────────────
  # Only runs if security-gate passes.
  release:
    needs: security-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (renderer)
        run: npx tsc --noEmit -p tsconfig.json

      - name: Typecheck (main process)
        run: npx tsc --noEmit -p tsconfig.node.json
        continue-on-error: true

      - name: Build & Package (macOS)
        if: matrix.platform == 'mac'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:mac -- --publish always

      - name: Build & Package (Windows)
        if: matrix.platform == 'win'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:win -- --publish always

      - name: Build & Package (Linux)
        if: matrix.platform == 'linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist:linux -- --publish always

      # ── Post-build audit: scan the actual packaged bundle ──
      - name: Audit packaged bundle (macOS)
        if: matrix.platform == 'mac'
        run: |
          APP=$(find dist -name "Cruchot.app" -maxdepth 3 | head -1)
          if [ -z "$APP" ]; then
            echo "::warning::No .app bundle found, skipping bundle audit"
            exit 0
          fi
          echo "Auditing: $APP"
          npm run audit:bundle -- "$APP"

      - name: Audit packaged bundle (Linux)
        if: matrix.platform == 'linux'
        run: |
          ASAR=$(find dist -name "app.asar" -path "*/linux-unpacked/*" | head -1)
          if [ -z "$ASAR" ]; then
            echo "::warning::No app.asar found, skipping bundle audit"
            exit 0
          fi
          echo "Auditing: $ASAR"
          npm run audit:bundle -- "$ASAR"

      # ── Verify @electron/fuses were flipped on the binary ──
      - name: Verify Electron fuses (macOS)
        if: matrix.platform == 'mac'
        run: |
          APP=$(find dist -name "Cruchot.app" -maxdepth 3 | head -1)
          if [ -z "$APP" ]; then
            echo "::warning::No .app bundle found, skipping fuse verification"
            exit 0
          fi
          echo "Reading fuses on: $APP"
          npx --yes @electron/fuses read --app "$APP" || true
